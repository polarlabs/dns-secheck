name: Build Windows release

on:
  push:
    branches:
      - main

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: install rust
        uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: stable
          target: x86_64-pc-windows-msvc
          override: true

      - name: build release binary
        run: cargo build --release --target=x86_64-pc-windows-msvc

      - name: package binary
        run: |
          mkdir dist
          copy target\x86_64-pc-windows-msvc\release\dns-out.exe dist\
          powershell -Command "Compress-Archive -Path dist\* -DestinationPath dist\dns-out.zip"

      - name: create github release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v0.1.0-${{ github.sha }}
          name: "Auto build for ${{ github.sha }}"
          draft: false
          prerelease: true
          files: dist\*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
